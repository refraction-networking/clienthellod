# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Check out the conformance corpus (enables TestConformanceCorpus)
      # Pinned submodule; skip the LFS sample blobs (only the small corpus is
      # needed). Without this, TestConformanceCorpus skips itself.
      run: GIT_LFS_SKIP_SMUDGE=1 git submodule update --init testdata/conformance

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.22.x"

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -timeout 10s -v ./...

    - name: Race Detection
      run: go test -timeout 10s -race ./...